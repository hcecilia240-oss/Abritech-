<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculador de Materiales | ABRITECH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<header>
    <div class="logo">ABRITECH</div>
    <nav>
        <a href="index.html">Inicio</a>
        <a href="tienda.html">Productos</a>
        <a href="calculador.html">Calculador</a>
        <a href="carrito.html" class="cart-btn">🛒 <span id="cart-count">0</span></a>
    </nav>
</header>

<main class="container">
    <section class="calculador-box">
        <h2 class="section-title">Calculador de Materiales</h2>
        <p class="subtitle">Ingresá las medidas de tu techo para obtener un estimado.</p>

        <div class="form-calculador">
            <div class="input-group">
                <label>Material a calcular:</label>
                <select id="material-tipo">
                    <option value="chapas">Chapas</option>
                    <option value="tirantes">Tirantes</option>
                    <option value="machimbre">Machimbre</option>
                </select>
            </div>

            <div class="grid-inputs">
                <div class="input-group">
                    <label>Ancho del techo (mts):</label>
                    <input type="number" id="ancho-techo" placeholder="Ej: 4.5">
                </div>
                <div class="input-group">
                    <label>Largo / Pendiente (mts):</label>
                    <input type="number" id="largo-techo" placeholder="Ej: 6.0">
                </div>
            </div>

            <button onclick="calcularTodo()" class="btn-primary" style="width:100%; margin-top:10px;">CALCULAR AHORA</button>
        </div>

        <div id="resultado-calculo" class="resultado-card" style="display:none;">
            <h3>Resultado Estimado:</h3>
            <p id="texto-resultado"></p>
            <button id="btn-agregar-calculo" class="btn-wa-sucursal" style="width:100%; border:none; cursor:pointer; margin-top:10px;">
                <i class="fas fa-cart-plus"></i> AGREGAR A MI LISTA
            </button>
        </div>
    </section>
</main>

<footer class="footer">
    <div class="footer-container">
        <div class="footer-logo">
            <img src="img/LOGO NUEVO ABRITECH.PNG" alt="Abritech - Maderas y Techos">
        </div>
        <p>ABRITECH © 2026 - Todos los derechos reservados</p>
        <p class="firma-dev">Desarrollo Web: <a href="#">CECILIA HERNANDEZ</a></p>
    </div>
</footer>

<script src="js/app.js"></script>
<script src="js/carrito.js"></script>
</body>
</html>
