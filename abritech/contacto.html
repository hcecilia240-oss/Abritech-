<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Abritech</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <header>
        <div class="logo">Abritech</div>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="tienda.html">Productos</a>
            <a href="contacto.html">Contacto</a>
            <a href="carrito.html" class="cart-btn">🛒 <span id="cart-count">0</span></a>
        </nav>
    </header>

    <section class="container" style="max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <h1 style="text-align: center;">Envianos tu consulta</h1>
        <form action="#" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="text" placeholder="Tu Nombre" style="padding: 12px; border: 1px solid #ddd; border-radius: 5px;">
            <input type="email" placeholder="Tu Email" style="padding: 12px; border: 1px solid #ddd; border-radius: 5px;">
            <textarea placeholder="¿En qué podemos ayudarte? (ej. presupuesto para techo de 4x5mt)" rows="5" style="padding: 12px; border: 1px solid #ddd; border-radius: 5px;"></textarea>
            <button type="submit" class="btn">Enviar Mensaje</button>
        </form>
    </section>

    <script src="js/carrito.js"></script>
</body>
</html>
