<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuesto | ABRITECH</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<header>
    <div class="logo">ABRITECH</div>
    <nav>
        <a href="index.html">Inicio</a>
        <a href="calculador.html">Calculador</a>
        <a href="carrito.html">🛒 <span id="cart-count">0</span></a>
    </nav>
</header>

<section class="container">
    <h2 style="text-align: center; text-transform: uppercase;">Tu Presupuesto</h2>
    
    <div id="lista-carrito" style="margin-bottom: 30px;"></div>

    <div class="card-carrito-container">
        <h3 style="margin-top:0; font-size: 1rem; text-transform: uppercase;">MÉTODO DE ENTREGA:</h3>
        
        <div style="margin: 20px 0;">
            <label style="display: flex; align-items: center; margin-bottom: 15px; cursor: pointer;">
                <input type="radio" name="entrega" value="Retiro por Monte Grande" checked style="margin-right:15px; transform:scale(1.3);"> 📍 Retiro por Monte Grande
            </label>
            <label style="display: flex; align-items: center; margin-bottom: 15px; cursor: pointer;">
                <input type="radio" name="entrega" value="Retiro por El Jagüel" style="margin-right:15px; transform:scale(1.3);"> 📍 Retiro por El Jagüel
            </label>
            <label style="display: flex; align-items: center; cursor: pointer;">
                <input type="radio" name="entrega" value="Envío a domicilio" style="margin-right:15px; transform:scale(1.3);"> 🚚 Envío a domicilio (A cotizar)
            </label>
        </div>

        <button onclick="finalizarPresupuesto()" class="btn-primary" style="width: 100%; font-size: 1.1rem; padding: 20px;">
            ENVIAR CONSULTA POR WHATSAPP
        </button>
    </div>
</section>

<footer class="footer">
    ABRITECH © 2026 - Desarrollo Web: <strong>Cecilia Hernandez</strong>
</footer>

<script src="js/carrito.js"></script>
</body>
</html>
